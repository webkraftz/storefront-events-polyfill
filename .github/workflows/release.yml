name: Release

# Changesets-driven release flow:
#  1. Contributors add a .changeset/ entry in their PR describing the bump.
#  2. On every push to main, the changesets bot opens / updates a "Version Packages" PR
#     that bumps the version + writes CHANGELOG.md.
#  3. When that PR is merged, this workflow publishes to npm via OIDC trusted
#     publishing (no PAT token required) and creates a GitHub release.
#
# OIDC publishing setup notes (see README's Releasing section):
#  - The `@retenka` npm scope must have GitHub trusted publishing configured
#    pointing at this repo + the publish workflow.
#  - `id-token: write` permission grants the OIDC token; `contents: write` lets
#    the changesets action create the version PR + GitHub releases.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Version + publish via changesets
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout (with full history for changesets)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Run CI gate before publishing
        run: npm run ci

      # Pin npm to a known-good v11 and print registry config — per npm
      # support's diagnostic checklist (ticket re: OIDC publish 404).
      # An older bundled npm (10.x) shipped with some node 22 minor releases
      # has documented quirks in the OIDC trusted-publishing exchange flow;
      # pinning to 11.x forces the publishing path we want.
      - name: Pin npm to v11 and print config
        run: |
          set -euo pipefail
          echo "node version:"
          node -v
          echo "npm version (before pin):"
          npm -v
          npm i -g npm@11
          echo "npm version (after pin):"
          npm -v
          echo "registry:"
          npm config get registry
          echo "ping:"
          npm ping --registry=https://registry.npmjs.org
          echo "config (all, scoped to npmjs.org auth lines):"
          # full config dump can leak env-injected secrets if any present;
          # filter to auth + registry lines only
          npm config list -l 2>&1 | grep -iE "(registry|authToken|userconfig|globalconfig|//)" || true

      # Diagnostic — prints the OIDC token's claims (payload only, no signature
      # or token bytes leaked) for the npm registry audience. Lets us verify
      # that `repository`, `repository_owner`, `workflow_ref`, `job_workflow_ref`,
      # `ref`, and `environment` match what the npm trusted-publisher row
      # expects. If npm's publish returns 404 ("not authorized" disguised),
      # comparing this log to the npm UI settings tells us which side is wrong.
      # Safe to leave in — the payload of a JWT is public info by design; only
      # the signature proves authenticity, and we never echo the full token.
      - name: Diagnostic — print OIDC claims for npm audience
        run: |
          set -euo pipefail
          : "${ACTIONS_ID_TOKEN_REQUEST_URL:?missing}"
          : "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:?missing}"
          response=$(curl -sSf \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=npm:registry.npmjs.org")
          token=$(echo "$response" | jq -r '.value')
          # JWT format: header.payload.signature  — base64url-decode payload only
          payload=$(echo "$token" | cut -d. -f2)
          # base64url → base64 (pad to multiple of 4)
          pad="===="
          padded="${payload}${pad:0:$(( (4 - ${#payload} % 4) % 4 ))}"
          decoded=$(echo "$padded" | tr -- '-_' '+/' | base64 -d)
          echo "::group::OIDC token claims (audience=npm:registry.npmjs.org)"
          echo "$decoded" | jq '{
            sub, aud, iss,
            repository, repository_owner, repository_id,
            workflow, workflow_ref, job_workflow_ref,
            ref, ref_type, sha, environment,
            run_id, run_attempt
          }'
          echo "::endgroup::"
          echo "::notice::Compare these claims against the npm trusted-publisher configuration at https://www.npmjs.com/package/@retenka/storefront-events-polyfill/access — repository + workflow filename + ref must match."

      # Replaced `npm run release` (which calls `changeset publish`) with a
      # direct `npm publish` invocation per npm support's diagnostic #1:
      # the `changeset publish` wrapper may bypass npm's OIDC token-exchange
      # path. The changesets/action still drives the Version PR flow (bumps
      # package.json + writes CHANGELOG) — we just take over the publish step
      # itself so the npm CLI handles auth directly.
      #
      # --loglevel verbose surfaces the OIDC handshake lines (per support
      # diagnostic #3) so we can compare a successful run against the failing
      # one. The action only invokes `publish` when there is an unpublished
      # version on disk that's missing from the registry — i.e., immediately
      # after a Version Packages PR merge.
      - name: Create release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          # Calls scripts/publish-if-new.sh which short-circuits when the
          # local package.json version is already on the registry (every
          # docs-only / workflow-only push to main, which would otherwise
          # produce a false-alarm CI failure email from npm rejecting a
          # double-publish). When the version DOES differ — i.e., a Version
          # Packages PR was just merged — it execs the real `npm publish
          # --access public --provenance --loglevel verbose`.
          publish: bash scripts/publish-if-new.sh
          commit: "chore: release @retenka/storefront-events-polyfill"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # NPM_TOKEN is intentionally omitted — `npm publish --provenance`
          # authenticates via the OIDC token exposed by the id-token: write
          # permission above. Per support diagnostic #4, no token-based auth
          # should be present at publish time.
